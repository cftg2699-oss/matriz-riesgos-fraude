<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment de Madurez Antifraude · Control Interno</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0B0F1A;--paper:#F7F4EE;--amber:#C8923A;--amber-l:#E8B870;
  --slate:#1C2539;--muted:#6B7180;--line:rgba(200,146,58,.15);
  --serif:'DM Serif Display',Georgia,serif;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:6px;
}
body{background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh;padding:2rem 1rem}
.card{background:rgba(28,37,57,.88);border:1px solid rgba(200,146,58,.2);border-radius:12px;padding:2rem;width:100%;max-width:700px;margin:0 auto;backdrop-filter:blur(8px)}
.label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--amber);text-transform:uppercase;margin-bottom:.5rem;text-align:center;display:block}
h2{font-family:var(--serif);font-size:1.8rem;text-align:center;margin-bottom:1.5rem}

/* Stepper de Progreso */
.stepper{display:flex;justify-content:space-between;margin-bottom:2rem;max-width:700px;margin-left:auto;margin-right:auto;position:relative}
.stepper::before{content:'';position:absolute;top:15px;left:0;right:0;height:2px;background:rgba(200,146,58,0.1);z-index:1}
.step{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;flex:1}
.step-circle{width:30px;height:30px;border-radius:50%;background:var(--slate);border:2px solid rgba(200,146,58,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);color:var(--muted);transition:all .3s}
.step.active .step-circle{background:var(--amber);color:var(--ink);border-color:var(--amber)}
.step.active .step-label{color:var(--amber);font-weight:500}
.step-label{font-size:9px;text-transform:uppercase;margin-top:8px;color:var(--muted);letter-spacing:1px;text-align:center}

/* Guía de Escala */
.scale-guide{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem;padding:15px;background:rgba(200,146,58,0.05);border-radius:var(--r);border:1px solid rgba(200,146,58,0.1)}
.guide-item{text-align:center}
.guide-n{display:block;font-family:var(--mono);color:var(--amber);font-weight:bold;font-size:14px}
.guide-t{display:block;font-size:10px;font-weight:bold;color:var(--paper);margin:2px 0}
.guide-d{display:block;font-size:9px;color:var(--muted);line-height:1.2}

/* Preguntas */
.q-block{margin-bottom:1.8rem;border-bottom:1px solid rgba(200,146,58,0.05);padding-bottom:1.2rem}
.q-text{font-size:0.95rem;margin-bottom:1rem;color:rgba(247,244,238,0.9)}
.options{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.opt{background:rgba(11,15,26,0.5);border:1px solid rgba(200,146,58,0.15);border-radius:var(--r);padding:10px;text-align:center;cursor:pointer;transition:all .2s}
.opt:hover{border-color:var(--amber)}
.opt.sel{background:var(--amber);color:var(--ink)}
.opt.sel .opt-n{color:var(--ink)}
.opt-n{display:block;font-family:var(--mono);font-weight:bold;color:var(--amber)}

.nav-btns{display:flex;justify-content:space-between;margin-top:2rem}
.btn{font-family:var(--mono);padding:12px 24px;border-radius:var(--r);border:none;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:1px;transition:all .2s}
.btn-p{background:var(--amber);color:var(--ink);font-weight:bold}
.btn-g{background:transparent;color:var(--paper);border:1px solid rgba(247,244,238,0.2)}
.btn:disabled{opacity:0.3;cursor:not-allowed}

.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>

<div id="quiz-screen" class="screen active">
  <div class="stepper" id="stepper"></div>
  
  <div class="card">
    <span class="label" id="dim-code">DIMENSIÓN 01</span>
    <h2 id="dim-name">Cargando...</h2>

    <div class="scale-guide">
      <div class="guide-item">
        <span class="guide-n">1</span>
        <span class="guide-t">INICIAL</span>
        <span class="guide-d">Inexistente o reacción informal.</span>
      </div>
      <div class="guide-item">
        <span class="guide-n">2</span>
        <span class="guide-t">EN DESARROLLO</span>
        <span class="guide-d">Parcialmente definido o manual.</span>
      </div>
      <div class="guide-item">
        <span class="guide-n">3</span>
        <span class="guide-t">ESTABLECIDO</span>
        <span class="guide-d">Formalizado y estandarizado.</span>
      </div>
      <div class="guide-item">
        <span class="guide-n">4</span>
        <span class="guide-t">OPTIMIZADO</span>
        <span class="guide-d">Automatizado y monitoreado.</span>
      </div>
    </div>

    <div id="questions-container"></div>

    <div class="nav-btns">
      <button class="btn btn-g" id="btn-prev" onclick="prevD()">Anterior</button>
      <button class="btn btn-p" id="btn-next" onclick="nextD()">Siguiente Dimensión</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwliXIxVxChMnLetWphUX1AjMiR6XR8lWo2ILYAIuCZ8yluD_tpOkHB8HpJwL0ucAn5/exec";

const DIMS = [
  { name: "Gobierno y Cultura", qs: ["¿Existe una política antifraude formal?", "¿Hay un canal de denuncias anónimo?", "¿La gerencia promueve la ética?", "¿Existe un comité de ética?", "¿Se sancionan los casos detectados?"] },
  { name: "Evaluación de Riesgos", qs: ["¿Se identifican riesgos anualmente?", "¿Hay un inventario de riesgos de fraude?", "¿Se mide el impacto financiero?", "¿Se evalúan riesgos emergentes?", "¿Se revisan riesgos por área?"] },
  { name: "Actividades de Control", qs: ["¿Hay segregación de funciones?", "¿Se realizan auditorías sorpresa?", "¿Hay controles en pagos a proveedores?", "¿Se verifican antecedentes de empleados?", "¿Se revisan accesos a sistemas?"] },
  { name: "Tecnología y Analítica", qs: ["¿Se usa software para detectar anomalías?", "¿Se analizan datos masivos?", "¿Hay alertas automatizadas?", "¿Los logs están protegidos?", "¿Se usa IA para prevención?"] },
  { name: "Cumplimiento y Legal", qs: ["¿Cumplen normativas locales?", "¿Hay un oficial de cumplimiento?", "¿Se capacita al personal?", "¿Se reportan casos a autoridades?", "¿Se auditan contratos?"] },
  { name: "Respuesta e Investigación", qs: ["¿Hay un protocolo de investigación?", "¿Tienen peritos forenses?", "¿Se recuperan activos?", "¿Hay plan de comunicación de crisis?", "¿Se corrigen fallas tras un fraude?"] }
];

let currentDim = 0;
let answers = DIMS.map(() => Array(5).fill(null));

function renderStepper() {
  const container = document.getElementById('stepper');
  container.innerHTML = DIMS.map((d, i) => `
    <div class="step ${i === currentDim ? 'active' : ''} ${i < currentDim ? 'completed' : ''}">
      <div class="step-circle">${i + 1}</div>
      <div class="step-label">${d.name.split(' ')[0]}</div>
    </div>
  `).join('');
}

function renderQuestions() {
  const d = DIMS[currentDim];
  document.getElementById('dim-code').innerText = `DIMENSIÓN 0${currentDim + 1}`;
  document.getElementById('dim-name').innerText = d.name;
  
  let html = '';
  d.qs.forEach((q, i) => {
    html += `
      <div class="q-block">
        <p class="q-text"><strong>${i + 1}.</strong> ${q}</p>
        <div class="options">
          ${[1,2,3,4].map(n => `
            <div class="opt ${answers[currentDim][i] === n ? 'sel' : ''}" onclick="selectOpt(${i}, ${n})">
              <span class="opt-n">${n}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  
  document.getElementById('questions-container').innerHTML = html;
  document.getElementById('btn-prev').disabled = currentDim === 0;
  document.getElementById('btn-next').innerText = currentDim === DIMS.length - 1 ? 'Finalizar Assessment' : 'Siguiente Dimensión';
  
  renderStepper();
}

function selectOpt(qi, val) {
  answers[currentDim][qi] = val;
  renderQuestions();
}

function nextD() {
  if (answers[currentDim].includes(null)) {
    alert("Por favor responde todas las preguntas de esta sección.");
    return;
  }
  
  if (currentDim < DIMS.length - 1) {
    currentDim++;
    window.scrollTo(0,0);
    renderQuestions();
  } else {
    finishAssessment();
  }
}

function prevD() {
  if (currentDim > 0) {
    currentDim--;
    window.scrollTo(0,0);
    renderQuestions();
  }
}

async function finishAssessment() {
  const finalScores = answers.map(d => d.reduce((a, b) => a + b, 0) / 5);
  const totalScore = finalScores.reduce((a, b) => a + b, 0) / 6;

  document.getElementById('quiz-screen').innerHTML = `
    <div class="card" style="text-align:center">
      <h2 style="color:var(--amber)">Assessment Completado</h2>
      <p>Tu score general de madurez es: <strong>${totalScore.toFixed(2)} / 4.0</strong></p>
      <p style="margin-top:1rem; font-size:14px; color:var(--muted)">Estamos registrando tus resultados en el sistema...</p>
    </div>
  `;

  // Envío de datos
  const payload = {
    score_general: totalScore.toFixed(2),
    gobernanza: finalScores[0],
    riesgos: finalScores[1],
    controles: finalScores[2],
    tecnologia: finalScores[3],
    cumplimiento: finalScores[4],
    respuesta: finalScores[5]
  };

  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
    alert("Datos guardados con éxito.");
  } catch (e) {
    console.error("Error al guardar:", e);
  }
}

renderQuestions();
</script>

</body>
</html>
